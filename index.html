<!DOCTYPE html>

<head>

<title>五胡乱华时期势力变化图 (304-439) — 高精版</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --bg: #1a1a2e;
  --text: #e8dcc8;
  --accent: #d4a843;
  --panel-bg: rgba(22,22,40,0.93);
  --border: rgba(200,180,150,0.18);
  --hover: rgba(212,168,67,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Serif SC','Source Han Serif SC','SimSun','STSong',serif;
  background: var(--bg); overflow:hidden; height:100vh;
}
#map { height:100vh; width:100vw; position:absolute; top:0; left:0; z-index:1; }

/* Header */
#header {
  position:absolute; top:0; left:0; right:0; z-index:10;
  background: linear-gradient(180deg, rgba(22,22,40,0.96) 55%, transparent 100%);
  padding:14px 22px 30px; pointer-events:none;
}
#header .t { font-size:24px; font-weight:bold; color:var(--text); letter-spacing:3px; text-shadow:0 0 20px rgba(0,0,0,0.9); }
#header .st { font-size:13px; color:#b0a080; margin-top:3px; }

/* Panel */
.panel {
  position:absolute; z-index:10; background:var(--panel-bg);
  border:1px solid var(--border); border-radius:10px; padding:14px;
  color:var(--text); font-size:13px; backdrop-filter:blur(12px);
  max-height:calc(100vh - 280px); overflow-y:auto;
}
#info { top:100px; right:14px; width:270px; }
#info .yr { font-size:38px; font-weight:bold; color:var(--accent); text-align:center; }
#info .era { text-align:center; font-size:12px; color:#a09080; margin-bottom:10px; }
#info .events { font-size:12px; line-height:1.7; }
#info .ev { padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
#info .ev .y { color:var(--accent); font-weight:bold; }

#legend { left:14px; top:100px; width:230px; }
#legend h3 { font-size:14px; margin-bottom:8px; color:var(--accent); }
#legend .ri {
  display:flex; align-items:center; padding:3px 6px; cursor:pointer;
  border-radius:4px; transition:background 0.2s; font-size:12px;
}
#legend .ri:hover { background:var(--hover); }
#legend .ri.hl { background:rgba(255,255,255,0.12); }
#legend .cb { width:15px; height:15px; border-radius:3px; margin-right:7px; border:1px solid rgba(255,255,255,0.25); flex-shrink:0; }
#legend .rin { flex:1; min-width:0; }
#legend .rnm { font-weight:bold; }
#legend .rd { font-size:10px; color:#a09080; }
#legend .rr { font-size:10px; color:#c0b090; }

/* Controls */
#ctrls {
  position:absolute; bottom:0; left:0; right:0; z-index:10;
  background:linear-gradient(0deg, rgba(22,22,40,0.96) 55%, transparent 100%);
  padding:28px 20px 14px;
}
#sc { display:flex; align-items:center; gap:12px; }
#yl {
  font-size:22px; font-weight:bold; color:var(--accent); min-width:52px; text-align:center;
  text-shadow:0 0 12px rgba(212,168,67,0.5);
}
#sl {
  flex:1; -webkit-appearance:none; height:7px; border-radius:4px; outline:none; cursor:pointer;
  background:linear-gradient(90deg, #7b1a1a, #c0392b, #d4a843, #1a7a3a, #2471a3, #6c3483, #5d6d7e);
}
#sl::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:#d4a843; cursor:pointer; box-shadow:0 0 14px rgba(212,168,67,0.7); border:2px solid #fff;
}
.bg { display:flex; gap:5px; }
.btn {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:rgba(22,22,40,0.85); color:var(--text); cursor:pointer;
  font-size:15px; display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.btn:hover { background:var(--hover); border-color:var(--accent); }
.btn.on { background:rgba(212,168,67,0.4); border-color:var(--accent); }
#spd { font-size:11px; color:#a09080; min-width:36px; text-align:center; cursor:pointer; user-select:none; }

/* Quick jump */
#qj { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; justify-content:center; }
.qjb {
  font-size:10px; padding:2px 8px; border-radius:12px;
  border:1px solid var(--border); background:rgba(22,22,40,0.8);
  color:#b0a080; cursor:pointer; white-space:nowrap; transition:all 0.2s;
  font-family: inherit;
}
.qjb:hover { border-color:var(--accent); color:var(--accent); background:rgba(212,168,67,0.15); }
.qjb.kr { border-color:rgba(200,100,80,0.5); color:#d08060; }

/* Tooltip */
#tt {
  position:absolute; z-index:20; pointer-events:none;
  background:rgba(22,22,40,0.94); border:1px solid var(--accent);
  border-radius:6px; padding:9px 13px; color:var(--text); font-size:13px; display:none;
}
#tt .tn { font-size:15px; font-weight:bold; color:var(--accent); }
#tt .td { font-size:11px; color:#c0b090; margin-top:2px; }

/* Leaflet */
.leaflet-control-zoom { margin-top:78px !important; }
.rlabel { background:none; border:none; box-shadow:none; font-size:12px; font-weight:bold; color:#fff; text-shadow:0 0 6px #000,0 0 6px #000; white-space:nowrap; pointer-events:none; }
.geo-label { background:none; border:none; box-shadow:none; font-weight:bold; text-shadow:0 0 5px #000,0 0 5px #000; white-space:nowrap; pointer-events:none; }

@media (max-width:768px) {
  #legend { width:170px; left:6px; top:75px; font-size:11px; padding:8px; }
  #info { width:200px; right:6px; top:75px; font-size:11px; padding:10px; }
  #info .yr { font-size:28px; }
  #header .t { font-size:17px; }
}
</style>
</head>

<div id="header">

// Reference: 谭其骧《中国历史地图集》第四册, 魏俊杰《十六国疆域与政区研究》

const R = {}; // Regime registry

}

const regimeLayers = {};
const tEl = document.getElementById('tt');
const tN = tEl.querySelector('.tn');
const tD = tEl.querySelector('.td');

function sT(e,d){
  tN.textContent=d.n; tD.innerHTML=`民族: ${d.e} | 统治者: ${d.r}<br>都城: ${d.cN}`;
  tEl.style.display='block';tEl.style.left=(e.originalEvent.clientX+18)+'px';tEl.style.top=(e.originalEvent.clientY-30)+'px';
}
function hT(){tEl.style.display='none';}
function mT(e){tEl.style.left=(e.originalEvent.clientX+18)+'px';tEl.style.top=(e.originalEvent.clientY-30)+'px';}

Object.keys(R).forEach(id=>{
  const r=R[id];
  const gl = L.geoJSON(null,{
    style:{color:r.c,weight:1.5,fillColor:r.c,fillOpacity:0.38},
    interactive:true,
    onEachFeature:function(f,layer){
      layer.on({
        mouseover:function(e){
          const p=f.properties;
          sT(e,{n:p.name,e:p.ethnicity,r:p.ruler,cN:p.capitalName});
          layer.setStyle({weight:3.5,fillOpacity:0.55});
        },
        mouseout:function(){hT();layer.setStyle({weight:1.5,fillOpacity:0.38,color:f.properties.color,fillColor:f.properties.color});},
        mousemove:mT,
        click:function(){const b=layer.getBounds();if(b.isValid())map.fitBounds(b,{padding:[40,40],maxZoom:7});},
      });
    },
  });
  const cm = L.circleMarker([0,0],{radius:6,color:'#fff',weight:2.5,fillColor:r.c,fillOpacity:1});
  const cl = L.marker([0,0],{
    icon:L.divIcon({className:'rlabel',html:'',iconSize:[90,22],iconAnchor:[45,26]}),
    interactive:false,
  });
  // Division labels (historical 州 names)
  const divMarkers = [];
  regimeLayers[id]={polygon:gl,capital:cm,capLabel:cl,divMarkers};
});

// ================================================================
// GET ACTIVE REGIMES
// ================================================================
function getActive(year){
  const a=[];
  Object.entries(R).forEach(([id,regime])=>{
    if(year<regime.sy||year>regime.ey)return;
    let ph=null;
    for(const p of regime.ph){if(year>=p.s&&year<=p.e){ph=p;break;}}
    if(!ph)return;
    let ruler=null;
    for(const ru of regime.r){if(year>=ru.s&&year<=ru.e){ruler=ru;break;}}
    a.push({
      id,name:regime.n,ethnicity:regime.e,color:regime.c,
      capital:regime.cap,capitalName:regime.capN,
      ruler:ruler?ruler.n:'—',territory:ph.t,
    });
  });
  return a;
}

// ================================================================
// UPDATE MAP
// ================================================================
function updateMap(year){
  const active=getActive(year);
  const features=[];
  active.forEach(r=>{
    r.territory.forEach(ring=>{
      features.push({
        type:'Feature',
        properties:{regimeId:r.id,name:r.name,ethnicity:r.ethnicity,color:r.color,ruler:r.ruler,capitalName:r.capitalName},
        geometry:{type:'Polygon',coordinates:[ring]},
      });
    });
  });

  Object.keys(regimeLayers).forEach(id=>{
    const l=regimeLayers[id];
    const rfs=features.filter(f=>f.properties.regimeId===id);
    if(rfs.length>0){
      l.polygon.clearLayers();
      l.polygon.addData({type:'FeatureCollection',features:rfs});
      l.polygon.setStyle({color:R[id].c,weight:1.5,fillColor:R[id].c,fillOpacity:0.38});
      const rd=active.find(a=>a.id===id);
      if(rd){
        l.capital.setLatLng([rd.capital[1],rd.capital[0]]);
        l.capital.setStyle({fillColor:rd.color,color:'#fff'});
        l.capital.unbindPopup();
        l.capital.bindPopup(`<b>${rd.name}</b><br>都城: ${rd.capitalName}<br>统治者: ${rd.ruler}<br>民族: ${rd.ethnicity}`);
        l.capital.on({
          mouseover:function(e){sT(e,{n:rd.name,e:rd.ethnicity,r:rd.ruler,cN:rd.capitalName});},
          mouseout:hT,mousemove:mT,
        });
        l.capLabel.setLatLng([rd.capital[1]+0.35,rd.capital[0]]);
        l.capLabel.setIcon(L.divIcon({
          className:'rlabel',
          html:`<div style="font-size:10px;font-weight:bold;text-shadow:0 0 5px #000,0 0 5px #000;">${rd.name}</div>`,
          iconSize:[90,22],iconAnchor:[45,11],
        }));
        // Division labels (historical 州)
        const divs = DIVISIONS[id] || [];
        // Remove old div markers
        l.divMarkers.forEach(m=>{if(map.hasLayer(m))map.removeLayer(m);});
        l.divMarkers.length = 0;
        divs.forEach(d=>{
          const dm = L.marker([d.lat,d.lng],{
            icon: L.divIcon({
              className: 'geo-label',
              html: `<div style="color:${rd.color};font-size:9px;font-weight:bold;text-shadow:0 0 4px #000,0 0 4px #000;opacity:0.85;">${d.n}</div>`,
              iconSize: [50,14], iconAnchor: [25,7],
            }),
            interactive: false,
          });
          dm.addTo(map);
          l.divMarkers.push(dm);
        });

        if(!map.hasLayer(l.capital))l.capital.addTo(map);
        if(!map.hasLayer(l.capLabel))l.capLabel.addTo(map);
        if(!map.hasLayer(l.polygon))l.polygon.addTo(map);
      }
    }else{
      if(map.hasLayer(l.polygon))map.removeLayer(l.polygon);
      if(map.hasLayer(l.capital))map.removeLayer(l.capital);
      if(map.hasLayer(l.capLabel))map.removeLayer(l.capLabel);
      l.divMarkers.forEach(m=>{if(map.hasLayer(m))map.removeLayer(m);});
      l.divMarkers.length = 0;
    }
  });

  updateLegend(active);
  updateInfo(year,active);
  document.getElementById('yl').textContent=year;
  document.getElementById('yd').textContent=year;
}

function updateLegend(active){
  document.getElementById('ll').innerHTML=active.map(r=>`
    <div class="ri" data-regime="${r.id}"
         onmouseenter="hl('${r.id}')" onmouseleave="uhl('${r.id}')"
         onclick="zoomR('${r.id}')" title="点击聚焦 ${r.name}">
      <div class="cb" style="background:${r.color}"></div>
      <div class="rin">
        <div class="rnm">${r.name}</div>
        <div class="rd">${r.ethnicity}</div>
        <div class="rr">👤 ${r.ruler}</div>
      </div>
    </div>
  `).join('');
}

function updateInfo(year,active){
  const edEl=document.getElementById('ed'), evsEl=document.getElementById('evs');
  let era='';
  if(year<311)era='西晋末年 · 汉赵崛起';
  else if(year<316)era='永嘉之乱 · 西晋垂亡';
  else if(year<329)era='两赵并立 · 前赵vs后赵';
  else if(year<350)era='后赵称霸 · 石虎暴政';
  else if(year<370)era='前燕前秦对峙 · 双雄争锋';
  else if(year<383)era='前秦统一北方 · 苻坚盛世';
  else if(year<394)era='淝水战后 · 北方再分裂';
  else if(year<407)era='慕容诸燕 · 群雄逐鹿';
  else if(year<420)era='东晋末期 · 刘裕北伐';
  else if(year<439)era='北魏扩张 · 蚕食诸国';
  else era='北魏统一 · 南北朝开启';
  edEl.textContent=era;
  const yes=EVENTS.filter(e=>e.y===year);
  evsEl.innerHTML=`<div class="ev">活跃政权: <b>${active.length}</b> 个</div>`+
    yes.map(e=>`<div class="ev"><span class="y">${e.y}年</span> ${e.t}</div>`).join('');
}

// Highlight/unhighlight
function hl(id){
  if(regimeLayers[id]&&map.hasLayer(regimeLayers[id].polygon)){
    regimeLayers[id].polygon.setStyle({weight:3.5,fillOpacity:0.55});
    regimeLayers[id].capital.setRadius(8);
    document.querySelector(`.ri[data-regime="${id}"]`)?.classList.add('hl');
  }
}
function uhl(id){
  if(regimeLayers[id]&&map.hasLayer(regimeLayers[id].polygon)){
    const c=R[id].c;regimeLayers[id].polygon.setStyle({weight:1.5,fillOpacity:0.38,color:c,fillColor:c});
    regimeLayers[id].capital.setRadius(6);
    document.querySelector(`.ri[data-regime="${id}"]`)?.classList.remove('hl');
  }
}
function zoomR(id){
  const l=regimeLayers[id];
  if(l&&map.hasLayer(l.polygon)){
    const b=l.polygon.getBounds();
    if(b.isValid()){
      map.fitBounds(b,{padding:[60,60],maxZoom:7});
      l.polygon.setStyle({weight:3.5,fillOpacity:0.55});
      setTimeout(()=>{const c=R[id].c;l.polygon.setStyle({weight:1.5,fillOpacity:0.38,color:c,fillColor:c});},1800);
    }
  }
}
window.hl=hl;window.uhl=uhl;window.zoomR=zoomR;

const slider=document.getElementById('sl');
let cy=304, playing=false, speed=1, animId=null, lastT=0;
const BASE=350;

slider.addEventListener('input',()=>{cy=parseInt(slider.value);updateMap(cy);});

function jmp(d){cy=Math.max(304,Math.min(439,cy+d));slider.value=cy;updateMap(cy);}
document.getElementById('bp').addEventListener('click',()=>jmp(-1));
document.getElementById('bn').addEventListener('click',()=>jmp(1));
document.getElementById('bpl').addEventListener('click',()=>{
  const b=document.getElementById('bpl');
  if(playing){playing=false;if(animId)cancelAnimationFrame(animId);b.textContent='▶';b.classList.remove('on');}
  else{playing=true;lastT=performance.now();requestAnimationFrame(anim);b.textContent='⏸';b.classList.add('on');}
});

function anim(ts){
  if(!playing)return;
  ts=ts||performance.now();
  if(ts-lastT>=BASE/speed){
    lastT=ts;
    if(cy<439){cy++;slider.value=cy;updateMap(cy);}
    else{playing=false;document.getElementById('bpl').textContent='▶';document.getElementById('bpl').classList.remove('on');return;}
  }
  animId=requestAnimationFrame(anim);
}

document.getElementById('spd').addEventListener('click',()=>{
  const sp=[0.5,1,2,3,5,10];const i=sp.indexOf(speed);speed=sp[(i+1)%sp.length];
  document.getElementById('spd').textContent=speed+'×';
});

document.addEventListener('keydown',e=>{

    case'ArrowLeft':jmp(-1);break;
    case'ArrowRight':jmp(1);break;
    case'ArrowUp':jmp(-5);break;
    case'ArrowDown':jmp(5);break;
    case' ':e.preventDefault();document.getElementById('bpl').click();break;
  }
});

  if(e.originalEvent.ctrlKey||e.originalEvent.metaKey)return;
  wa+=e.originalEvent.deltaY>0?1:-1;
  if(Math.abs(wa)>=3){const d=wa>0?1:-1;wa=0;jmp(d);}
});
