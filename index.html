// Major rivers for reference (Leaflet uses [lat, lng] for polylines)
function addRiverLine(coords, name, color, weight) {
  // Convert [lng, lat] to [lat, lng] for Leaflet polyline
  const swapped = coords.map(([lng, lat]) => [lat, lng]);
  L.polyline(swapped, {
    color: color || '#4a90d9', weight: weight || 2, opacity: 0.5, interactive: false,
  }).addTo(map);
  // Add river name label at midpoint
  const mid = swapped[Math.floor(swapped.length / 2)];
  if (name) {
    L.marker(mid, {
      icon: L.divIcon({
        className: 'regime-label',
        html: `<div style="color:#5ba0e0;font-size:11px;font-style:italic;text-shadow:0 0 4px #000;">${name}</div>`,
        iconSize: [60, 16],
        iconAnchor: [30, 8],
      }),
      interactive: false,
    }).addTo(map);
  }
}

// Initialize regime layers on the map
Object.keys(REGIMES).forEach(id => {

    style: { color: r.color, weight: 1.5, fillColor: r.color, fillOpacity: 0.35 },
    interactive: true,
    onEachFeature: function(feature, layer) {
      layer.on({
        mouseover: function(e) {

          showTooltip(e, {
            name: props.name,
            ethnicity: props.ethnicity,
            ruler: props.ruler,
            capitalName: props.capitalName,
          });
          layer.setStyle({ weight: 3, fillOpacity: 0.5 });
        },
        mouseout: function() {
          hideTooltip();
          const props = feature.properties;
          layer.setStyle({
            weight: 1.5, fillOpacity: 0.35,

          });
        },
        mousemove: moveTooltip,

          if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 7 });
          }

  });

  const capitalMarker = L.circleMarker([0, 0], {

  });

// Function to get active regimes and their territories for a given year
function getActiveRegimes(year) {
  const active = [];
  Object.entries(REGIMES).forEach(([id, regime]) => {
    if (year < regime.startYear || year > regime.endYear) return;
    // Find the appropriate phase
    let activePhase = null;
    for (const phase of regime.phases) {
      if (year >= phase.start && year <= phase.end) {
        activePhase = phase;
        break;
      }
    }
    if (activePhase) {
      // Find the ruler for this year
      let ruler = null;
      for (const r of regime.rulers) {
        if (year >= r.start && year <= r.end) {
          ruler = r;
          break;
        }
      }
      active.push({
        id,
        name: regime.name,
        ethnicity: regime.ethnicity,
        color: regime.color,
        capital: regime.capital,
        capitalName: regime.capitalName,
        ruler: ruler ? ruler.name : '—',
        territory: activePhase.territory,
      });
    }
  });
  return active;
}

// Function to update the map display for a given year
function updateMap(year) {
  const active = getActiveRegimes(year);

  // Build GeoJSON features
  const features = [];
  active.forEach(regime => {
    // Each territory entry is an array of rings (first is outer, rest are holes)
    regime.territory.forEach(ring => {
      features.push({
        type: 'Feature',
        properties: {
          regimeId: regime.id,
          name: regime.name,
          ethnicity: regime.ethnicity,
          color: regime.color,
          ruler: regime.ruler,
          capitalName: regime.capitalName,
        },
        geometry: {
          type: 'Polygon',
          coordinates: [ring],
        },
      });
    });
  });

  const geoJSON = { type: 'FeatureCollection', features };

  // Update each regime layer
  Object.keys(regimeLayers).forEach(id => {
    const layer = regimeLayers[id];
    const regimeFeatures = features.filter(f => f.properties.regimeId === id);

    if (regimeFeatures.length > 0) {
      const featureCollection = { type: 'FeatureCollection', features: regimeFeatures };
      layer.polygon.clearLayers();
      layer.polygon.addData(featureCollection);
      layer.polygon.setStyle({
        color: REGIMES[id].color,
        weight: 1.5,
        fillColor: REGIMES[id].color,
        fillOpacity: 0.35,
      });

      // Update capital marker
      const regData = active.find(a => a.id === id);
      if (regData) {
        layer.capital.setLatLng([regData.capital[1], regData.capital[0]]);
        layer.capital.setStyle({ fillColor: regData.color, color: '#fff' });
        layer.capital.unbindPopup();
        layer.capital.bindPopup(
          `<b>${regData.name}</b><br>都城: ${regData.capitalName}<br>统治者: ${regData.ruler}<br>民族: ${regData.ethnicity}`
        );
        layer.capital.on({
          mouseover: function(e) {
            showTooltip(e, {
              name: regData.name,
              ethnicity: regData.ethnicity,
              ruler: regData.ruler,
              capitalName: regData.capitalName,
            });
          },
          mouseout: hideTooltip,
          mousemove: moveTooltip,
        });
        if (!map.hasLayer(layer.capital)) layer.capital.addTo(map);

        layer.capitalLabel.setLatLng([regData.capital[1] + 0.3, regData.capital[0]]);
        layer.capitalLabel.setIcon(L.divIcon({
          className: 'regime-label',
          html: `<div style="font-size:10px;font-weight:bold;text-shadow:0 0 6px #000,0 0 6px #000;">${regData.name}</div>`,
          iconSize: [80, 20],
          iconAnchor: [40, 10],
        }));
        if (!map.hasLayer(layer.capitalLabel)) layer.capitalLabel.addTo(map);

        if (!map.hasLayer(layer.polygon)) layer.polygon.addTo(map);
      }
    } else {
      // Remove inactive regime layers
      if (map.hasLayer(layer.polygon)) map.removeLayer(layer.polygon);
      if (map.hasLayer(layer.capital)) map.removeLayer(layer.capital);
      if (map.hasLayer(layer.capitalLabel)) map.removeLayer(layer.capitalLabel);
    }
  });

  // Update legend
  updateLegend(active);

  // Update info panel
  updateInfoPanel(year, active);

  // Update year display
  document.getElementById('year-label').textContent = year;
  document.getElementById('year-display').textContent = year;

  currentYearData.active = active;
  currentYearData.year = year;
}

// Zoom to a regime's territory
function zoomToRegime(id) {
  const layer = regimeLayers[id];
  if (layer && map.hasLayer(layer.polygon)) {
    const bounds = layer.polygon.getBounds();
    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [60, 60], maxZoom: 7 });
      // Flash effect
      const origStyle = { weight: 3, fillOpacity: 0.55 };
      layer.polygon.setStyle(origStyle);
      setTimeout(() => {
        layer.polygon.setStyle({ weight: 1.5, fillOpacity: 0.35 });
      }, 1500);
    }
  }
}

// Update info panel
function updateInfoPanel(year, active) {
  const dynastyEl = document.getElementById('dynasty-display');

  // Determine the era
  let dynasty = '';
  if (year < 316) dynasty = '西晋末年';
  else if (year < 329) dynasty = '两赵并立时期';
  else if (year < 350) dynasty = '后赵称霸时期';
  else if (year < 370) dynasty = '前燕·前秦对峙';
  else if (year < 383) dynasty = '前秦统一北方';
  else if (year < 394) dynasty = '前秦崩溃·群雄并起';
  else if (year < 407) dynasty = '后燕·后秦·北魏争霸';
  else if (year < 420) dynasty = '东晋末期·诸国混战';
  else if (year < 439) dynasty = '刘宋初年·北魏扩张';

  const yearEvents = EVENTS.filter(e => e.year === year);

  eventsEl.innerHTML = summary + yearEvents.map(e =>
    `<div class="event"><span class="yr">${e.year}</span> ${e.text}</div>`
  ).join('');
}

// Highlight a regime on the map
function highlightRegime(id) {
  if (regimeLayers[id] && map.hasLayer(regimeLayers[id].polygon)) {
    regimeLayers[id].polygon.setStyle({
      weight: 3,
      fillOpacity: 0.55,
    });
    regimeLayers[id].capital.setRadius(7);
    // Highlight in legend
    const item = document.querySelector(`.regime-item[data-regime="${id}"]`);
    if (item) item.classList.add('highlight');
  }
}

function unhighlightRegime(id) {
  const r = REGIMES[id];
  if (regimeLayers[id] && map.hasLayer(regimeLayers[id].polygon)) {
    regimeLayers[id].polygon.setStyle({
      weight: 1.5,
      fillOpacity: 0.35,
      color: r.color,
      fillColor: r.color,
    });
    regimeLayers[id].capital.setRadius(5);
    const item = document.querySelector(`.regime-item[data-regime="${id}"]`);
    if (item) item.classList.remove('highlight');
  }
}

let animationId = null;

// Add tick marks to slider

});

document.getElementById('btn-play').addEventListener('click', () => {
  const btn = document.getElementById('btn-play');
  if (isPlaying) {
    stopPlayback();
    btn.textContent = '▶';
  } else {
    startPlayback();
    btn.textContent = '⏸';
  }
});

function startPlayback() {
  isPlaying = true;
  lastFrameTime = performance.now();
  animate();
}

function stopPlayback() {
  isPlaying = false;
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
}

function animate(timestamp) {
  if (!isPlaying) return;

  if (!timestamp) timestamp = performance.now();
  const elapsed = timestamp - lastFrameTime;
  const interval = BASE_INTERVAL / playSpeed;

  if (elapsed >= interval) {
    lastFrameTime = timestamp;
    if (currentYear < 439) {
      currentYear++;
      slider.value = currentYear;
      updateMap(currentYear);
    } else {
      stopPlayback();
      document.getElementById('btn-play').textContent = '▶';
      return;
    }
  }

  animationId = requestAnimationFrame(animate);
}

// Speed control - click speed label to cycle
document.getElementById('speed-label').addEventListener('click', () => {
  const speeds = [0.5, 1, 2, 3, 5, 10];
  const idx = speeds.indexOf(playSpeed);
  playSpeed = speeds[(idx + 1) % speeds.length];
  document.getElementById('speed-label').textContent = playSpeed + 'x';
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowLeft':
      if (currentYear > 304) { currentYear--; slider.value = currentYear; updateMap(currentYear); }
      break;
    case 'ArrowRight':
      if (currentYear < 439) { currentYear++; slider.value = currentYear; updateMap(currentYear); }
      break;
    case ' ':
      e.preventDefault();
      document.getElementById('btn-play').click();
      break;
    case 'ArrowUp':
      if (currentYear + 5 <= 439) { currentYear += 5; slider.value = currentYear; updateMap(currentYear); }
      break;
    case 'ArrowDown':
      if (currentYear - 5 >= 304) { currentYear -= 5; slider.value = currentYear; updateMap(currentYear); }
      break;
  }
});

// Mouse wheel over map changes year
let wheelAccumulator = 0;
map.on('wheel', (e) => {
  if (e.originalEvent.ctrlKey || e.originalEvent.metaKey) return; // Allow zoom
  wheelAccumulator += e.originalEvent.deltaY > 0 ? 1 : -1;
  if (Math.abs(wheelAccumulator) >= 3) {
    const delta = wheelAccumulator > 0 ? 1 : -1;
    wheelAccumulator = 0;
    const newYear = Math.max(304, Math.min(439, currentYear + delta));
    if (newYear !== currentYear) {
      currentYear = newYear;
      slider.value = currentYear;
      updateMap(currentYear);
    }
  }
});
